<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Happy Birthday</title>
        <meta name="description" content="Interactive birthday webpage with canvas fireworks, Web Audio sound effects, and background music">
        <meta name="keywords" content="birthday, fireworks, interactive, Carlewis">
        <meta name="robots" content="index, follow">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@900&display=swap" rel="stylesheet">
        <style>
            body {
                margin: 0;
                background: #020202;
                cursor: crosshair;
            }
            canvas { display: block; }
            h1 {
                position: absolute;
                top: 20%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #fff;
                font-family: "Source Sans 3", "Source Sans Pro", sans-serif;
                font-size: 38px;
                font-weight: 900;
                user-select: none;
            }
            h2 {
                position: absolute;
                top: 35%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #fff;
                font-family: "Source Sans 3", "Source Sans Pro", sans-serif;
                font-size: 24px;
                font-weight: 900;
                user-select: none;
            }
            .credits {
                position: absolute;
                top: 45%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #fff;
                font-family: "Source Sans 3", "Source Sans Pro", sans-serif;
                font-size: 12px;
                font-weight: 900;
                user-select: none;
                text-align: center;
                margin: 0;
            }
            .tooltip {
                position: absolute;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                color: rgba(255, 255, 255, 0.75);
                font-family: "Source Sans 3", "Source Sans Pro", sans-serif;
                font-size: 14px;
                user-select: none;
                pointer-events: none;
                animation: fadeout 5s forwards;
                white-space: nowrap;
            }
            @keyframes fadeout {
                0%   { opacity: 1; }
                70%  { opacity: 1; }
                100% { opacity: 0; }
            }
        </style>
    </head>
    <body>
        <h1>Happy Birthday</h1>
        <h2>NICK</h2>
        <p class="credits">{ Wish you a wonderful day Buddy! Chess boss. }<br>{ Developed by Carlewis }</p>
        <div class="tooltip">Tap or click anywhere to shoot fireworks!</div>
        <canvas id="birthday-wish"></canvas>
        <!-- Place a birthday.mp3 file in this folder for music -->
        <audio src="./birthday.mp3" autoplay controls loop style="opacity: 0;"></audio>
    </body>

<script>
const PI2 = Math.PI * 2
const random = (min, max) => Math.random() * (max - min + 1) + min | 0
const timestamp = _ => new Date().getTime()

const sfx = new (window.AudioContext || window.webkitAudioContext)()

function playLaunch() {
  const osc = sfx.createOscillator()
  const gain = sfx.createGain()
  osc.connect(gain)
  gain.connect(sfx.destination)
  osc.frequency.setValueAtTime(150, sfx.currentTime)
  osc.frequency.exponentialRampToValueAtTime(900, sfx.currentTime + 0.35)
  gain.gain.setValueAtTime(0.15, sfx.currentTime)
  gain.gain.exponentialRampToValueAtTime(0.001, sfx.currentTime + 0.35)
  osc.start()
  osc.stop(sfx.currentTime + 0.35)
}

function playExplosion() {
  const dur = 0.6
  const buf = sfx.createBuffer(1, sfx.sampleRate * dur, sfx.sampleRate)
  const data = buf.getChannelData(0)
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.5)
  }
  const src = sfx.createBufferSource()
  src.buffer = buf
  const filter = sfx.createBiquadFilter()
  filter.type = 'bandpass'
  filter.frequency.value = 350
  filter.Q.value = 0.5
  const gain = sfx.createGain()
  gain.gain.setValueAtTime(0.8, sfx.currentTime)
  gain.gain.exponentialRampToValueAtTime(0.001, sfx.currentTime + dur)
  src.connect(filter)
  filter.connect(gain)
  gain.connect(sfx.destination)
  src.start()
}

class Birthday {
  constructor() {
    this.resize()
    this.fireworks = []
    this.counter = 0
  }

  resize() {
    this.width = canvas.width = window.innerWidth
    let center = this.width / 2 | 0
    this.spawnA = center - center / 4 | 0
    this.spawnB = center + center / 4 | 0

    this.height = canvas.height = window.innerHeight
    this.spawnC = this.height * .1
    this.spawnD = this.height * .5
  }

  onClick(evt) {
    let x = evt.clientX || evt.touches && evt.touches[0].pageX
    let y = evt.clientY || evt.touches && evt.touches[0].pageY

    let count = random(3, 5)
    for (let i = 0; i < count; i++) this.fireworks.push(new Firework(
      random(this.spawnA, this.spawnB),
      this.height,
      x,
      y,
      random(0, 260),
      random(30, 110)))

    this.counter = -1
  }

  update(delta) {
    ctx.globalCompositeOperation = 'hard-light'
    ctx.fillStyle = `rgba(20,20,20,${7 * delta})`
    ctx.fillRect(0, 0, this.width, this.height)

    ctx.globalCompositeOperation = 'lighter'
    for (let firework of this.fireworks) firework.update(delta)

    this.counter += delta * 3
    if (this.counter >= 1) {
      this.fireworks.push(new Firework(
        random(this.spawnA, this.spawnB),
        this.height,
        random(0, this.width),
        random(this.spawnC, this.spawnD),
        random(0, 360),
        random(30, 110)))
      this.counter = 0
    }

    // prune dead fireworks every frame to prevent unbounded growth
    this.fireworks = this.fireworks.filter(f => !f.dead)
  }
}

class Firework {
  constructor(x, y, targetX, targetY, shade, offsprings) {
    this.dead = false
    this.offsprings = offsprings
    this.x = x
    this.y = y
    this.targetX = targetX
    this.targetY = targetY
    this.shade = shade
    this.history = []
    if (offsprings) playLaunch()
  }

  update(delta) {
    if (this.dead) return

    let xDiff = this.targetX - this.x
    let yDiff = this.targetY - this.y
    if (Math.abs(xDiff) > 3 || Math.abs(yDiff) > 3) {
      this.x += xDiff * 2 * delta
      this.y += yDiff * 2 * delta

      this.history.push({ x: this.x, y: this.y })
      if (this.history.length > 20) this.history.shift()
    } else {
      if (this.offsprings && !this.madeChilds) {
        playExplosion()
        let babies = this.offsprings / 2
        for (let i = 0; i < babies; i++) {
          let targetX = this.x + this.offsprings * Math.cos(PI2 * i / babies) | 0
          let targetY = this.y + this.offsprings * Math.sin(PI2 * i / babies) | 0
          birthday.fireworks.push(new Firework(this.x, this.y, targetX, targetY, this.shade, 0))
        }
      }
      this.madeChilds = true
      this.history.shift()
    }

    if (this.history.length === 0) {
      this.dead = true
    } else if (this.offsprings) {
      for (let i = 0; i < this.history.length; i++) {
        let point = this.history[i]
        ctx.beginPath()
        ctx.fillStyle = 'hsl(' + this.shade + ',100%,' + i + '%)'
        ctx.arc(point.x, point.y, 1, 0, PI2, false)
        ctx.fill()
      }
    } else {
      ctx.beginPath()
      ctx.fillStyle = 'hsl(' + this.shade + ',100%,50%)'
      ctx.arc(this.x, this.y, 1, 0, PI2, false)
      ctx.fill()
    }
  }
}

let canvas = document.getElementById('birthday-wish')
let ctx = canvas.getContext('2d')
let audio = document.querySelector('audio')

let then = timestamp()
let birthday = new Birthday()

function startAudio() {
  audio.play().catch(() => {})
  sfx.resume().catch(() => {})
  document.removeEventListener('click', startAudio)
  document.removeEventListener('touchstart', startAudio)
}

window.onresize = () => birthday.resize()
document.addEventListener('click', startAudio)
document.addEventListener('touchstart', startAudio)
document.onclick = evt => birthday.onClick(evt)
document.ontouchstart = evt => birthday.onClick(evt)

;(function loop() {
  requestAnimationFrame(loop)
  let now = timestamp()
  let delta = now - then
  then = now
  birthday.update(delta / 1000)
})()
</script>
</html>
